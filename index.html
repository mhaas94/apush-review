  vocab:[{term:"Popular Sovereignty",def:"Principle allowing residents of a territory to vote on whether to allow slavery."},{term:"Emancipation Proclamation",def:"Lincoln's 1863 executive order freeing enslaved people in Confederate states, transforming the war's purpose."},{term:"Radical Reconstruction",def:"Congressional program (1867) imposing military rule on the South and requiring states to ratify the 14th Amendment."},{term:"Freedmen's Bureau",def:"Federal agency established 1865 to assist formerly enslaved people with education, labor, and legal disputes."},{term:"Black Codes",def:"Post-war Southern laws severely restricting the rights and mobility of freed African Americans."},{term:"Sharecropping",def:"Labor system where freedmen farmed white-owned land in exchange for a crop share, creating cycles of debt."}],
  quiz:[
   Q("The Kansas-Nebraska Act (1854) was most significant because it:",["Permanently settled the question of slavery in the territories","Effectively repealed the Missouri Compromise and intensified sectional conflict","Granted statehood to Kansas and Nebraska","Expanded the Compromise of 1850 to new territories"],1,"By allowing popular sovereignty in Kansas and Nebraska — where slavery had been banned by the Missouri Compromise — the act reignited the slavery debate and led to 'Bleeding Kansas' violence."),
   Q("The Emancipation Proclamation was strategically significant because it:",["Immediately freed all enslaved people in the U.S.","Prevented European powers from supporting the Confederacy","Gave formerly enslaved men the right to vote","Was passed by Congress as a constitutional amendment"],1,"By framing the war as a fight against slavery, the Proclamation made it politically impossible for Britain and France — which had abolished slavery — to recognize or aid the Confederacy."),
   Q("The end of Reconstruction in 1877 was most directly caused by:",["The complete restoration of Southern loyalty to the Union","A political compromise that removed federal troops from the South","Supreme Court rulings protecting African American rights","The economic success of the Freedmen's Bureau"],1,"The Compromise of 1877 resolved the disputed 1876 election by awarding the presidency to Hayes in exchange for withdrawing federal troops from the South, effectively ending Reconstruction."),
   Q("The 14th Amendment was most significant because it:",["Gave African American men the right to vote","Abolished slavery throughout the United States","Defined citizenship and guaranteed equal protection under the law","Established the Freedmen's Bureau"],2,"The 14th Amendment defined citizenship for anyone born or naturalized in the U.S., overturning Dred Scott, and guaranteed equal protection — the legal foundation for later civil rights struggles."),
   Q("Sharecropping after the Civil War is best understood as:",["A fair labor system giving freedmen economic opportunity","A form of economic bondage recreating conditions similar to slavery","A successful federal program to distribute land","A system chosen freely by most formerly enslaved people"],1,"Sharecroppers were trapped in debt cycles, required to purchase supplies from planters at inflated prices, making it nearly impossible to accumulate capital — perpetuating racial and economic inequality."),
   Q("Which best explains why Reconstruction ultimately failed to achieve racial equality?",["Radical Republicans never had majority support in Congress","The federal government lacked the will to sustain enforcement against Southern resistance","African Americans refused to participate in Reconstruction governments","The 13th Amendment left too many loopholes"],1,"Northern Republicans grew tired of Reconstruction, KKK violence undermined Black political participation, and the federal government ultimately withdrew its enforcement commitment."),
   Q("The Dred Scott decision (1857) is significant primarily because it:",["Upheld the Missouri Compromise as constitutional","Declared that African Americans had no rights that white Americans were bound to respect","Gave Congress full power to prohibit slavery in the territories","Led directly to the Civil War"],1,"Chief Justice Taney's ruling declared that African Americans were not citizens, had no constitutional rights, and that Congress lacked power to ban slavery in the territories — inflaming sectional tensions enormously."),
   Q("'Bleeding Kansas' refers to:",["Violent conflict between pro-slavery and anti-slavery settlers in Kansas after the Kansas-Nebraska Act","High casualty rates of the Civil War's Western campaigns","The suffering of Cherokee people on the Trail of Tears","A slave rebellion in Kansas that preceded the Civil War"],0,"After the Kansas-Nebraska Act opened Kansas to popular sovereignty, pro-slavery 'border ruffians' and anti-slavery 'free soilers' engaged in violent conflict — a preview of the coming Civil War."),
   Q("The Radical Republicans' primary goal during Reconstruction was to:",["Punish the South as harshly as possible for secession","Ensure the political and civil rights of freed people and reshape Southern society","Quickly restore Southern states with minimal conditions","Focus federal resources on Western expansion"],1,"Radical Republicans like Thaddeus Stevens and Charles Sumner believed Reconstruction must guarantee rights for freed people through the 14th and 15th Amendments and military enforcement."),
   Q("The 13th Amendment (1865) was historically significant because it:",["Gave African American men the right to vote","Guaranteed equal protection under the law","Permanently abolished slavery throughout the United States","Established the Freedmen's Bureau"],2,"The 13th Amendment abolished slavery and involuntary servitude throughout the United States — completing what Lincoln had begun with the Emancipation Proclamation."),
   Q("John Brown's raid on Harpers Ferry (1859) polarized the nation primarily because:",["It succeeded in starting a massive slave rebellion","Northerners celebrated it as heroic while Southerners saw it as proof of Northern aggression","It led directly to South Carolina's secession","Lincoln publicly endorsed the raid"],1,"Brown's failed raid divided the nation: many Northerners saw Brown as a martyr fighting evil, while Southerners were horrified, seeing the raid as evidence that the North intended to incite slave revolt."),
   Q("The Compromise of 1850 attempted to resolve sectional tensions by:",["Banning slavery in all new territories","Admitting California as a free state while strengthening the Fugitive Slave Law","Extending the Missouri Compromise line to the Pacific","Allowing each territory to vote on slavery through popular sovereignty"],1,"The Compromise admitted California as free, allowed popular sovereignty in new territories, and passed a strengthened Fugitive Slave Act requiring Northerners to return escaped enslaved people."),
   Q("Which best describes the experience of African Americans during Reconstruction?",["Reconstruction was a complete failure with no gains for African Americans","African Americans made significant political gains that were later undermined by violence and legal discrimination","African Americans gained permanent political equality lasting through the Gilded Age","African Americans voluntarily withdrew from politics to focus on economic advancement"],1,"During Reconstruction, Black men voted, served in legislatures, and held federal offices. These gains were systematically eroded by Black Codes, KKK violence, and Supreme Court decisions limiting federal enforcement."),
   Q("The significance of the Battle of Gettysburg (1863) was that it:",["Ended the Civil War by capturing Richmond","Was the turning point that halted the Confederate invasion of the North","Was the first major Union victory of the war","Led directly to the Emancipation Proclamation"],1,"Gettysburg was the high-water mark of Confederate power. Lee's failed invasion and devastating losses meant the Confederacy could no longer realistically hope to win the war by taking it to Northern soil."),
   Q("The Black Codes passed by Southern states after the Civil War most directly:",["Granted limited political rights to freed people","Attempted to recreate the conditions of slavery through legal restrictions on Black labor and movement","Were immediately struck down by the federal courts","Focused primarily on education and economic regulations"],1,"Black Codes restricted freedpeople's right to travel, work independently, own land, or testify in court — essentially attempting to legally recreate slavery and a key reason Congress took control of Reconstruction from President Johnson.")
  ]},
 {id:6,dates:"1865–1898",title:"Gilded Age",summary:"Industrialization, immigration, urbanization, and the rise of big business.",
  themes:["Industrial capitalism creates massive wealth and inequality","New immigrants reshape urban America","Farmers and workers organize against corporate power","Social Darwinism vs. Social Gospel debate poverty's causes"],
  events:[{year:"1869",text:"Transcontinental Railroad completed; Knights of Labor founded"},{year:"1876",text:"Battle of Little Bighorn; Alexander Graham Bell patents the telephone"},{year:"1882",text:"Chinese Exclusion Act bars Chinese immigration"},{year:"1886",text:"Haymarket Affair; American Federation of Labor (AFL) founded"},{year:"1887",text:"Dawes Act dismantles tribal lands; Interstate Commerce Act regulates railroads"},{year:"1890",text:"Sherman Antitrust Act; Battle of Wounded Knee; Ghost Dance movement crushed"},{year:"1892",text:"Homestead Strike; Populist Party founded"},{year:"1896",text:"Plessy v. Ferguson establishes 'separate but equal'"}],
  keyterms:[
   {group:"Economy & Big Business",terms:["Gilded Age","Trusts and holding companies","Laissez-faire policies","Transcontinental railroads","Vertical integration (Carnegie)","Horizontal integration (Rockefeller)","Gospel of Wealth","Tariff and currency issues"]},
   {group:"Labor & Immigration",terms:["Local / national unions","Mass Wave of Migration: S. & E. Europe and Asia","Urban political machines","Jane Addams & settlement houses"]},
   {group:"Society & Ideas",terms:["Social Darwinism","Social Gospel, utopians, socialists","'New South'","Sharecropping / tenant farming","Forced Assimilation","Plessy v. Ferguson ('Separate but Equal')"]},
   {group:"Political Movements",terms:["People's Party (Populists)"]}
  ],
  vocab:[{term:"Social Darwinism",def:"Belief applying Darwin's 'survival of the fittest' to human society, justifying inequality as natural and inevitable."},{term:"Vertical Integration",def:"Strategy of controlling all stages of production — practiced by Carnegie in steel."},{term:"Horizontal Integration",def:"Strategy of monopolizing an industry by absorbing competitors — practiced by Rockefeller in oil."},{term:"Gilded Age",def:"Mark Twain's term for the late 19th century — glittering on the surface, corrupt beneath."},{term:"Populism",def:"Political movement of farmers demanding railroad regulation, graduated income tax, and silver-backed currency."},{term:"New Immigration",def:"Wave of immigrants from Southern and Eastern Europe (Italians, Poles, Jews) arriving in large numbers after 1880."}],
  quiz:[
   Q("Which best describes the economic philosophy of Social Darwinism?",["Government should regulate business to protect workers","Natural selection justifies economic inequality and opposes government intervention","Society benefits when wealth is redistributed equally","Religious duty requires helping the poor"],1,"Social Darwinists like Herbert Spencer applied Darwin's evolutionary theory to society, arguing that the wealthy 'survived' because of natural superiority and that helping the poor interfered with natural selection."),
   Q("The Populist Party platform of the 1890s primarily called for:",["Protective tariffs to help American manufacturers","Government ownership of railroads and a graduated income tax","Restrictions on immigration to protect American workers","Expansion of U.S. territory overseas"],1,"The Populists represented agrarian interests, calling for government control of railroads, a graduated income tax, direct election of senators, and a flexible currency backed by silver."),
   Q("The significance of Plessy v. Ferguson (1896) was that it:",["Granted African Americans full voting rights","Declared segregation constitutional under 'separate but equal'","Overturned the Black Codes","Extended civil rights protections in the South"],1,"Plessy established the 'separate but equal' doctrine, providing constitutional justification for Jim Crow segregation that would define American race relations until Brown v. Board of Education (1954)."),
   Q("The Chinese Exclusion Act of 1882 is significant because it:",["Was the first federal law restricting immigration based on race or nationality","Protected Chinese workers from discrimination","Was quickly repealed after protests","Applied equally to all Asian immigrants"],0,"The Chinese Exclusion Act was the first major federal law restricting immigration on racial/national grounds, reflecting racial anxieties and labor competition — a precedent for later restrictive immigration laws."),
   Q("Andrew Carnegie's 'Gospel of Wealth' argued that:",["Wealthy industrialists had a moral duty to use wealth for public benefit","Workers deserved to share in the profits of industry","Government should redistribute wealth through taxation","Social Darwinism justified doing nothing for the poor"],0,"Carnegie believed the wealthy were stewards of society's surplus capital with a duty to use it for public benefit through philanthropy — justifying inequality while softening it with charitable giving."),
   Q("The Dawes Act (1887) affected Native Americans primarily by:",["Giving tribal governments greater autonomy","Breaking up tribal lands into individual allotments, weakening tribal identity and resulting in massive land loss","Protecting Native Americans from white settlers","Establishing reservations with permanent boundaries"],1,"The Dawes Act divided communal tribal lands into individual family plots, resulting in the loss of approximately 90 million acres of Native land and devastating tribal communities over the following decades."),
   Q("The Haymarket Affair of 1886 most damaged:",["The Populist Party's electoral chances","The labor movement's public image by associating it with radicalism and violence","The American Federation of Labor's membership","The federal government's reputation for protecting workers"],1,"A bomb explosion at a labor rally in Chicago, followed by police violence, was blamed on anarchists and union organizers — associating the labor movement with radicalism and setting it back significantly."),
   Q("The Homestead Strike of 1892 is significant because it:",["Was the first successful labor strike in American history","Demonstrated the power of big business to crush labor organizing with government support","Led to major federal legislation protecting workers","Proved that workers and management could negotiate successfully"],1,"Carnegie Steel's use of Pinkerton agents and state militia to violently break the Homestead Strike showed that industrialists could deploy both private and government force to crush unions."),
   Q("The 'New Immigration' of the 1880s–1900s differed from earlier immigration primarily in that:",["New immigrants came primarily from Western Europe","New immigrants came from Southern and Eastern Europe, were often Catholic or Jewish, and faced greater discrimination","New immigrants were primarily skilled workers","New immigrants were more easily assimilated into American society"],1,"The New Immigration brought Italians, Poles, Russians, Jews, and others from Southern and Eastern Europe — groups that faced severe discrimination, nativist hostility, and charges of being 'unassimilable.'"),
   Q("Which best explains why farmers supported the Populist demand for 'free silver'?",["Silver coinage would create inflation, making it easier for farmers to repay debts","Silver was more valuable than gold and would enrich farming communities","The silver standard would strengthen the dollar internationally","Free silver would reduce competition from foreign agricultural producers"],0,"Farmers were crushed by deflation — falling crop prices made it harder to repay fixed debts. Inflating the money supply through free silver would raise prices and make debts easier to repay."),
   Q("The Interstate Commerce Act (1887) was significant because it:",["Established the first federal agency to regulate a private industry","Broke up the Standard Oil monopoly","Gave labor unions federal legal protection","Prohibited immigration from Eastern Europe"],0,"The Interstate Commerce Act created the Interstate Commerce Commission to regulate railroad rates — the first federal attempt to regulate a private industry, establishing a precedent for Progressive Era regulation."),
   Q("The Battle of Wounded Knee (1890) marked:",["A major Native American military victory over U.S. forces","The effective end of armed Native American resistance on the Great Plains","The beginning of the Ghost Dance movement","The first use of federal troops against Native Americans"],1,"Wounded Knee, where the U.S. Army massacred approximately 250 Lakota men, women, and children, effectively ended armed resistance on the Plains and marked the tragic conclusion of the Indian Wars."),
   Q("How did the transcontinental railroad most transform the American economy?",["It primarily benefited Eastern manufacturers at the expense of Western farmers","It created a national market by connecting regions and enabling mass movement of goods and people","It eliminated competition and created a natural monopoly in transportation","It reduced the need for labor in the West"],1,"The transcontinental railroad created a truly national economy by integrating regional markets, enabling mass migration to the West, and allowing Eastern manufacturers to sell to Western markets."),
   Q("The Sherman Antitrust Act (1890) was significant primarily because:",["It immediately broke up all major monopolies","It established the legal principle that monopolistic practices were illegal, even if initially weakly enforced","It granted workers the right to organize","It regulated railroad rates for the first time"],1,"The Sherman Act established that contracts or combinations in restraint of trade were illegal — but it was initially used more against labor unions than monopolies, and courts interpreted it very narrowly."),
   Q("Political machines like Tammany Hall were significant because they:",["Were purely corrupt organizations providing nothing to urban residents","Provided real services to immigrants in exchange for votes, despite widespread graft","Were quickly dismantled by Progressive Era reformers","Operated only in the South"],1,"Political machines traded patronage — jobs, housing assistance, legal help — for immigrant votes. They were genuinely corrupt but also provided a social safety net that government did not, making them difficult to dismantle.")
  ]},
 {id:7,dates:"1890–1945",title:"Progressivism, WWI & WWII",summary:"Reform era, American world power, Great Depression, and World War II.",
  themes:["Progressives use government to regulate capitalism and protect citizens","U.S. emerges as a world power through imperialism and WWI","Great Depression challenges laissez-faire economics; New Deal reshapes government","WWII unites the nation but reveals contradictions of freedom at home"],
  events:[{year:"1898",text:"Spanish-American War; U.S. gains Philippines, Puerto Rico, Guam"},{year:"1906",text:"Pure Food and Drug Act; The Jungle published by Upton Sinclair"},{year:"1913",text:"16th Amendment (income tax); 17th Amendment (direct Senate election) ratified"},{year:"1917",text:"U.S. enters WWI; Espionage Act limits civil liberties"},{year:"1919",text:"Treaty of Versailles; Senate rejects League of Nations; Red Scare begins"},{year:"1920",text:"19th Amendment grants women the right to vote"},{year:"1929",text:"Stock market crash triggers the Great Depression"},{year:"1933",text:"FDR inaugurated; New Deal programs begin (FDIC, CCC, TVA)"},{year:"1941",text:"Pearl Harbor attack; U.S. enters WWII"},{year:"1945",text:"Atomic bombs dropped on Hiroshima and Nagasaki; WWII ends"}],
  keyterms:[
   {group:"Progressive Era",terms:["Progressives","Populists","Muckrakers","Progressive Amendments: prohibition, woman suffrage","Preservationists vs. Conservationists","Flappers","Great Migration","Harlem Renaissance","Red Scare","Immigration Quotas","Dust Bowl"]},
   {group:"The Great Depression & New Deal",terms:["Great Depression","Franklin Roosevelt's New Deal: relief, recovery, reform"]},
   {group:"U.S. Imperialism",terms:["Imperialism","Spanish-American War (acquire lands)","Filipino Insurrection"]},
   {group:"World War I",terms:["WWI: neutrality to war — Wilson's 14 Points","Treaty of Versailles: Ratification Battle, League of Nations"]},
   {group:"World War II",terms:["Fascism & totalitarianism","Pearl Harbor: Japanese attack","Nazi concentration camps & Holocaust","WWII: island hopping, D-Day"]}
  ],
  vocab:[{term:"Muckraker",def:"Progressive Era journalist who exposed corruption and social problems (e.g., Upton Sinclair, Ida Tarbell, Jacob Riis)."},{term:"New Deal",def:"FDR's programs (1933–39) addressing the Great Depression through relief, recovery, and reform."},{term:"Isolationism",def:"Policy of avoiding foreign entanglements; dominant in U.S. foreign policy between the World Wars."},{term:"Internment",def:"Forced relocation and imprisonment of Japanese Americans during WWII under Executive Order 9066."},{term:"Harlem Renaissance",def:"1920s cultural flourishing of African American literature, art, and music centered in New York City."},{term:"Keynesian Economics",def:"Theory advocating government spending to stimulate the economy during recessions, underlying the New Deal."}],
  quiz:[
   Q("Progressive Era reforms most directly responded to problems created by:",["The aftermath of the Civil War","Industrialization, immigration, and urbanization","World War I","The Great Depression"],1,"Progressivism emerged in response to Gilded Age social problems — dangerous workplaces, corrupt political machines, food safety scandals, and exploitation of workers and immigrants."),
   Q("The New Deal is best understood as:",["A socialist revolution overthrowing capitalism","A set of reforms preserving capitalism while expanding government's role in the economy","A return to laissez-faire economic principles","A program focused exclusively on helping farmers"],1,"The New Deal reformed and stabilized capitalism by regulating banks, creating relief programs, and establishing a social safety net — fundamentally changing the relationship between government and citizens."),
   Q("The internment of Japanese Americans during WWII demonstrated that:",["National security can lead to violations of civil liberties","The government effectively protected all citizens equally","Congress exercised oversight over executive power","Public opinion consistently opposed racial discrimination"],0,"Internment showed how wartime fear and racial prejudice could override civil liberties. The Supreme Court upheld it in Korematsu v. U.S. (1944) — a decision later repudiated as a grave injustice."),
   Q("The U.S. Senate's rejection of the League of Nations reflected:",["A desire for closer ties with European powers","Isolationist sentiment and fears of surrendering U.S. sovereignty","Congressional support for Woodrow Wilson's foreign policy","Opposition only to the Treaty of Versailles terms"],1,"Republican senators feared the League would obligate the U.S. to enter foreign wars without Congressional authority — reflecting deep American isolationism after WWI."),
   Q("The Harlem Renaissance is best understood as:",["A political movement demanding civil rights legislation","A cultural flowering asserting African American dignity and identity","A program of urban renewal funded by the New Deal","A migration of African Americans from the North to the South"],1,"The Harlem Renaissance was a cultural movement in which Black writers, artists, and musicians like Langston Hughes, Zora Neale Hurston, and Duke Ellington asserted African American identity and challenged racial stereotypes."),
   Q("The GI Bill (1944) most significantly contributed to post-war America by:",["Funding military expansion during the Cold War","Expanding the middle class through education and housing benefits for veterans","Providing reparations to Japanese American internees","Creating Medicare and Social Security benefits"],1,"The GI Bill funded college education and low-interest home loans for veterans, dramatically expanding the American middle class and fueling suburban growth — though benefits were often denied to Black veterans."),
   Q("The 16th Amendment (1913) was significant because it:",["Established Prohibition","Gave women the right to vote","Authorized Congress to collect a graduated income tax","Provided for the direct election of senators"],2,"The 16th Amendment authorized a graduated federal income tax — a key Progressive goal for making the wealthy pay proportionally more, redistributing the tax burden from tariffs (which hit consumers) to income."),
   Q("Theodore Roosevelt's approach to trusts is best described as:",["Complete laissez-faire — no government interference in business","Breaking up all large corporations regardless of behavior","Targeting corporations that abused their power, not bigness itself","Using federal power to nationalize key industries"],2,"Roosevelt distinguished between 'good trusts' (large but not abusive) and 'bad trusts' (monopolistic and harmful to the public), using the Sherman Act selectively — earning his trust-buster reputation."),
   Q("The Great Migration of African Americans to Northern cities (1910–1940) was primarily caused by:",["Better educational opportunities in the North","A combination of Southern racial violence and Northern industrial job opportunities during WWI","Federal programs encouraging Black relocation","The failure of Reconstruction agricultural programs"],1,"African Americans fled Jim Crow violence and poverty while Northern industries, desperate for labor during WWI, actively recruited Black workers — dramatically changing Northern cities' racial composition."),
   Q("Which best explains why the United States entered WWI in 1917?",["The U.S. had been allied with Britain and France since 1914","Unrestricted German submarine warfare and the Zimmermann Telegram threatened U.S. interests","The U.S. wanted to prevent Germany from acquiring European colonies","Congress unanimously declared war after the sinking of the Lusitania"],1,"Two key triggers: Germany's unrestricted submarine warfare threatening American lives and commerce, and the Zimmermann Telegram — Germany's proposal to Mexico to attack the U.S. in exchange for lost territories."),
   Q("The Scopes Trial of 1925 most directly revealed:",["The triumph of science over religion in American schools","Cultural conflicts between modernism and traditional religious values","The federal government's power to enforce educational standards","The decline of Protestant Christianity in the 1920s"],1,"The Scopes Trial dramatized the larger cultural war between urban modernists embracing science and rural traditionalists defending religious fundamentalism — a conflict that continues to echo in American politics."),
   Q("The Bonus Army march on Washington in 1932 is significant because:",["It succeeded in winning early payment of WWI bonuses","Its violent dispersal by the U.S. Army badly damaged Hoover's presidency","It was the largest labor strike in U.S. history","It led directly to the election of FDR"],1,"When Hoover ordered MacArthur to forcibly disperse WWI veterans peacefully demanding their promised bonuses, burning their camps and injuring marchers, the images devastated Hoover's remaining public support."),
   Q("The dropping of atomic bombs on Japan (1945) remains controversial primarily because:",["The bombs failed to end the war quickly","Historians debate whether it was necessary or whether it targeted civilian populations disproportionately","The bombs were stolen from Germany","The decision bypassed Congressional approval"],1,"Defenders argue the bombs prevented a costly land invasion. Critics argue Japan was near surrender, the bombs primarily targeted civilians, and the decision may have been partly intended to intimidate the Soviet Union."),
   Q("The New Deal's agricultural programs were controversial because:",["They raised food prices for struggling urban consumers while paying farmers to reduce production","They benefited only Southern planters rather than all farmers","They violated the Constitution's commerce clause","They were funded entirely by borrowing from foreign banks"],0,"The AAA paid farmers to reduce crop production to raise prices — helping larger commercial farmers but raising food costs for the urban poor during the Depression and displacing tenant farmers and sharecroppers."),
   Q("American imperialism following the Spanish-American War (1898) differed from earlier U.S. expansion because:",["It was motivated purely by religious missionary goals","It extended U.S. control over overseas territories with people of different cultures and races","It was entirely voluntary on the part of the territories acquired","It focused exclusively on economic rather than strategic interests"],1,"Earlier U.S. expansion absorbed contiguous territory expected to become states. After 1898, the U.S. acquired overseas territories (Philippines, Puerto Rico, Guam) without plans to grant statehood — provoking debates about empire and democracy.")
  ]},
 {id:8,dates:"1945–1980",title:"Cold War & Social Change",summary:"Cold War competition, civil rights revolution, Great Society, and Vietnam.",
  themes:["Cold War shapes domestic and foreign policy for decades","Civil rights movement dismantles legal segregation","Great Society expands government's social welfare role","Vietnam and social upheaval fracture the liberal consensus"],
  events:[{year:"1947",text:"Truman Doctrine; Marshall Plan to rebuild Europe; Cold War begins"},{year:"1950",text:"Korean War begins; McCarthy Red Scare accelerates"},{year:"1954",text:"Brown v. Board of Education overturns Plessy; McCarthy hearings collapse"},{year:"1955",text:"Montgomery Bus Boycott begins; Rosa Parks refuses to give up her seat"},{year:"1962",text:"Cuban Missile Crisis brings U.S. and USSR to nuclear brink"},{year:"1963",text:"March on Washington; Kennedy assassinated; LBJ becomes president"},{year:"1964",text:"Civil Rights Act; Gulf of Tonkin Resolution escalates Vietnam War"},{year:"1965",text:"Voting Rights Act; Great Society programs (Medicare, Medicaid)"},{year:"1968",text:"MLK and RFK assassinated; Chicago DNC riots; Nixon wins presidency"},{year:"1973",text:"Roe v. Wade; U.S. withdraws from Vietnam; Watergate scandal grows"}],
  keyterms:[
   {group:"Cold War Foreign Policy",terms:["Cold War","Containment","Domino Theory","Korea and Vietnam","Détente (mutual coexistence)","Decolonization","McCarthyism"]},
   {group:"Civil Rights & Social Movements",terms:["Brown v. Board of Education (1954)","Dr. Martin Luther King, Jr.","Civil Rights Act 1964","Black Power","Feminist and gay/lesbian movements","Latino, American Indian, Asian American movements","Environmental movements"]},
   {group:"Domestic Policy & Society",terms:["Lyndon Johnson's Great Society","Sun Belt","Suburbs","Baby boom","Immigration laws 1965","Counterculture, 1950s, Beats"]}
  ],
  vocab:[{term:"Containment",def:"U.S. Cold War policy (Truman Doctrine) aimed at preventing the spread of communism."},{term:"McCarthyism",def:"Senator McCarthy's campaign of unsubstantiated accusations of communist infiltration in the U.S. government."},{term:"Civil Disobedience",def:"Nonviolent resistance to unjust laws, central to the civil rights movement strategy."},{term:"Great Society",def:"LBJ's domestic programs creating Medicare, Medicaid, and expanding civil rights and education funding."},{term:"Détente",def:"Nixon's policy of easing Cold War tensions through diplomacy with the USSR and China."},{term:"Domino Theory",def:"Belief that if one country fell to communism, neighboring countries would follow — used to justify Vietnam War."}],
  quiz:[
   Q("The policy of containment called for:",["Invading countries that adopted communism","Using economic and military aid to prevent the spread of communism","Negotiating peace agreements with the Soviet Union","Building nuclear weapons as a deterrent"],1,"Containment, articulated by George Kennan, proposed using economic aid (Marshall Plan) and military support to prevent communist expansion without direct military confrontation with the USSR."),
   Q("Brown v. Board of Education (1954) was significant because it:",["Gave voting rights to African Americans","Declared racial segregation in public schools unconstitutional","Integrated the U.S. military","Ended Jim Crow laws throughout the South"],1,"Brown overruled Plessy v. Ferguson by declaring 'separate educational facilities are inherently unequal,' providing the legal foundation for the civil rights movement's broader assault on segregation."),
   Q("The Vietnam War most damaged the 'credibility gap' because:",["Congress refused to fund the war","Government statements about the war proved misleading or false","American forces suffered no military defeats","The war expanded to China"],1,"As the Pentagon Papers and journalistic coverage revealed, the government consistently misled the public about the war's progress, eroding trust in government and fueling the anti-war movement."),
   Q("The Cuban Missile Crisis (1962) was significant primarily because:",["It led to the Soviet Union withdrawing from Eastern Europe","It demonstrated that nuclear brinkmanship could be managed through negotiation","It resulted in a U.S. military victory in Cuba","It ended the Cold War rivalry"],1,"The 13-day standoff ended with Soviet missile withdrawal in exchange for a U.S. pledge not to invade Cuba — showing both the terrifying risks of nuclear confrontation and that diplomacy could de-escalate crises."),
   Q("The Civil Rights Act of 1964 was most significant because it:",["Gave African Americans the right to vote","Prohibited discrimination based on race, color, religion, sex, or national origin","Ended segregation only in public schools","Established affirmative action programs"],1,"The Civil Rights Act banned discrimination in public accommodations and employment — a sweeping expansion of federal civil rights protections that transformed American society."),
   Q("Nixon's policy of détente represented:",["An attempt to defeat the Soviet Union through military buildup","A pragmatic easing of Cold War tensions through diplomacy with China and the USSR","Abandonment of the containment doctrine","Withdrawal from all foreign military commitments"],1,"Détente accepted Cold War realities and sought to manage superpower rivalry through arms control treaties (SALT I) and Nixon's historic 1972 visit to China — a departure from ideological anti-communism."),
   Q("The Marshall Plan (1948) was significant primarily because it:",["Created NATO and the Western military alliance","Provided economic aid to rebuild Western Europe, preventing communist expansion","Established the Truman Doctrine of military containment","Ended the Berlin Blockade by forcing Soviet withdrawal"],1,"The Marshall Plan provided approximately $13 billion to rebuild war-devastated Western Europe, stabilizing democratic governments that might otherwise have turned to communism."),
   Q("McCarthyism damaged American society primarily by:",["Exposing actual Soviet spies in the federal government","Creating a climate of fear that suppressed free speech and destroyed careers through unproven accusations","Strengthening the Democratic Party's commitment to civil liberties","Leading to a major overhaul of U.S. intelligence agencies"],1,"McCarthy's accusations — rarely substantiated — destroyed careers and chilled free speech. The Red Scare showed how fear could be weaponized to suppress dissent and political opposition."),
   Q("The Freedom Riders of 1961 challenged:",["Segregation in interstate transportation","Voting rights restrictions in the Deep South","Segregation in public schools following Brown","Employment discrimination in federal agencies"],0,"Freedom Riders — interracial groups riding interstate buses into the South — challenged segregation in bus terminals, facing violent mobs and forcing the Kennedy administration to act on civil rights."),
   Q("The Tet Offensive (1968) was significant because it:",["Was a major military victory for North Vietnam","Destroyed U.S. public confidence in the war by contradicting government claims of progress","Led directly to the U.S. withdrawal from Vietnam","Was quickly repelled with minimal U.S. casualties"],1,"Though militarily repulsed, the Tet Offensive's scope shocked Americans who had been told the U.S. was winning — transforming Walter Cronkite and public opinion against the war."),
   Q("LBJ's Great Society programs most directly expanded the federal government's role by:",["Reducing spending on military programs to fund domestic needs","Creating Medicare, Medicaid, and expanded education funding as permanent entitlements","Nationalizing the healthcare and education industries","Primarily benefiting Southern white voters"],1,"The Great Society created Medicare and Medicaid, the Elementary and Secondary Education Act, the Voting Rights Act, and environmental legislation — dramatically expanding federal responsibility for social welfare."),
   Q("The women's liberation movement of the 1960s–70s is best understood as:",["A movement focused exclusively on gaining the right to vote","A broad challenge to gender discrimination in law, the workplace, and culture","A primarily Republican-led political reform initiative","A movement limited to middle-class white women"],1,"The women's liberation movement challenged workplace discrimination (Equal Pay Act, Title IX), reproductive rights (Roe v. Wade), cultural sexism, and gender roles — transforming American law and society."),
   Q("The Truman Doctrine (1947) committed the United States to:",["Providing economic aid to rebuild Europe","Supporting free peoples resisting communist takeover","Establishing a permanent military alliance with Western Europe","Preventing nuclear proliferation globally"],1,"The Truman Doctrine — prompted by communist threats to Greece and Turkey — committed the U.S. to supporting countries threatened by Soviet expansion, establishing the framework for decades of Cold War foreign policy."),
   Q("Nixon's 'Southern Strategy' was significant because it:",["Helped integrate Southern schools through federal enforcement","Used racial anxieties to win Southern white voters away from the Democratic Party","Strengthened civil rights enforcement in the South","Failed to win any Southern states for the Republican Party"],1,"Nixon's Southern Strategy used coded racial appeals ('law and order', 'states' rights') to win the white South for Republicans — realigning American politics and defining the parties' geographic bases for decades."),

const dbqChecklist=[{cat:"Pre-Writing",items:["Identify the historical skill (causation, comparison, or CCOT)","Identify the time period and geographic focus","Identify 2–3 BAGPIPE themes relevant to the prompt","Read and annotate all 7 documents","Group documents into 2+ categories that support your thesis","Select 2–4 best documents to source (HAPP)","Brainstorm 3+ pieces of outside evidence"]},{cat:"Thesis",items:["States a defensible, historically specific claim","Addresses ALL parts of the question","Does NOT simply restate the prompt","Establishes a line of reasoning (why/how)","For CCOT: establishes how much change occurred","For causation: ranks causes by relative importance","Is complex-direct or split thesis — not just a bare claim"]},{cat:"Contextualization",items:["Describes broader historical context BEFORE or DURING the time period","Provides at least 3–5 sentences (not just one)","Accurately connects context to the argument","Goes BEYOND naming an event — explains its significance","Is NOT the same as your thesis or inside evidence"]},{cat:"Document Use",items:["Uses at least 3 documents to address the topic (1 pt)","Uses at least 4 documents to support the thesis (2nd pt)","Summarizes each document accurately and relevantly","Analyzes HOW/WHY each doc supports the argument","Avoids just summarizing without connecting to thesis"]},{cat:"Sourcing (HAPP)",items:["Sourced 2 documents minimum (1 sourcing pt)","Attempts to source 4 documents (unicorn pt)","For each: attribute the audience, purpose, or POV","For each: explain HOW this affects the document's content","For each: prove it with specific evidence from the document","Sourcing is tied to your argument — not just a generic statement"]},{cat:"Outside Evidence",items:["Includes at least 1 piece of outside evidence","Outside evidence is SPECIFIC (name, date, law, event)","Outside evidence is relevant to AND supports the argument","Is NOT found in the documents","Is used to ANALYZE, not just listed"]},{cat:"Complexity (Unicorn)",items:["Option 1: Counter-argument in conclusion addresses opposing view","Option 2: Synthesis connects to a different time period or place (VERY specific)","Option 3: Historiography references Zinn, Schweikart, or Great Man/Events theory","Option 4: Correctly uses ALL 7 documents","Option 5: Correctly sources 4 documents using HAPP","Conclusion adds new analytical layer — does not just restate the intro"]}];
const leqChecklist=[{cat:"Pre-Writing",items:["Identify the historical skill (causation, comparison, or CCOT)","Identify time period and geographic scope","Choose the question you know the MOST about","Brainstorm 10+ outside facts, dates, people, events","Create a t-chart (CCOT) or cause/effect chart","Plan 3 body paragraphs using BAGPIPE themes"]},{cat:"Thesis",items:["Makes a defensible, historically specific claim","Addresses ALL parts of the prompt","Establishes a clear line of reasoning","For causation: ranks relative importance","For CCOT: specifies degree of change","Complex-direct form preferred: 'Although… ultimately…'","Includes categories of analysis (themes/reasons)"]},{cat:"Contextualization",items:["4–5 sentences minimum describing relevant background","Accurately connects broader context to the period","Goes beyond naming an event — explains WHY it matters","Connects context to the argument being made","Describes what was happening BEFORE the time period begins"]},{cat:"Evidence & Analysis",items:["At least 2 specific pieces of evidence (names, dates, events, laws)","Evidence is fully elaborated — not just listed","Uses historical skill language (caused, changed, compared)","Each body paragraph has a clear topic sentence from thesis","Analysis explains HOW evidence supports the argument","At least 4 pieces of evidence for maximum points"]},{cat:"Complexity (Unicorn)",items:["Conclusion goes beyond restating the intro","Option 1: Counter-argument — 'Although X, one might argue Z…'","Option 2: Synthesis — connect to a different time period (VERY specific)","Option 3: Historiography — reference historian perspectives","Option 4: Uses multiple historical skills in one essay","Conclusion is substantive — at least 4–5 sentences"]}];

let currentPeriod=null,quizState={},checkStates={};

function showSection(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='writing') renderWriting();
  if(name==='themes') renderThemes();
  if(name==='skills') renderSkills();
  if(name==='prompts') renderPrompts('all');
  if(name==='checklists') renderChecklists();
}

function renderPeriodCards(){
  document.getElementById('period-cards').innerHTML=periods.map(p=>`
    <div class="period-card" onclick="openPeriod(${p.id})">
      <span class="period-badge">Period ${p.id}</span>
      <h3>${p.dates}</h3>
      <div class="dates">${p.title}</div>
      <div class="summary">${p.summary.substring(0,90)}...</div>
    </div>`).join('');
}

function openPeriod(id){
  currentPeriod=periods.find(p=>p.id===id);
  document.getElementById('period-list').style.display='none';
  document.getElementById('period-detail').classList.add('active');
  document.getElementById('detail-title').textContent=`Period ${id}: ${currentPeriod.dates} — ${currentPeriod.title}`;
  document.querySelectorAll('.ctab').forEach((t,i)=>{t.classList.remove('active');if(i===0)t.classList.add('active');});
  document.querySelectorAll('.ctab-content').forEach((c,i)=>{c.classList.remove('active');if(i===0)c.classList.add('active');});
  renderOverview();
}

function backToPeriods(){
  document.getElementById('period-list').style.display='block';
  document.getElementById('period-detail').classList.remove('active');
}

function showCtab(name,btn){
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ctab-content').forEach(c=>c.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('ctab-'+name).classList.add('active');
  if(name==='overview') renderOverview();
  if(name==='events') renderEvents();
  if(name==='keyterms') renderKeyTerms();
  if(name==='vocab') renderVocab();
  if(name==='quiz') renderQuiz();
}

function renderKeyTerms(){
  const p=currentPeriod;
  const total=p.keyterms.reduce((n,g)=>n+g.terms.length,0);
  document.getElementById('ctab-keyterms').innerHTML=`
    <div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">${total} key terms across ${p.keyterms.length} categories — straight from your teacher's study guide.</div>
    ${p.keyterms.map(g=>`
      <div class="kt-group">
        <div class="kt-group-label">${g.group}</div>
        <div class="kt-grid">${g.terms.map(t=>`<div class="kt-chip">${t}</div>`).join('')}</div>
      </div>`).join('')}`;
}

function renderOverview(){
  const p=currentPeriod;
  document.getElementById('ctab-overview').innerHTML=`
    <div class="card">
      <h3>Period summary</h3>
      <p style="font-size:14px;line-height:1.7;">${p.summary}</p>
    </div>
    <div class="card">
      <h3>Key themes</h3>
      <div class="themes-section">${p.themes.map((t,i)=>`<div class="theme-row"><span class="theme-num">${i+1}</span><span class="theme-text">${t}</span></div>`).join('')}</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">
      <button class="btn" onclick="showCtab('events',null)">Key events →</button>
      <button class="btn" onclick="showCtab('keyterms',null)">Key terms →</button>
      <button class="btn" onclick="showCtab('vocab',null)">Vocabulary →</button>
      <button class="btn btn-primary" onclick="showCtab('quiz',null)">Take quiz (15 Qs) →</button>
    </div>`;
}

function renderEvents(){
  document.getElementById('ctab-events').innerHTML=`<div class="key-events">${currentPeriod.events.map(e=>`<div class="event-item"><span class="event-year">${e.year}</span><span class="event-text">${e.text}</span></div>`).join('')}</div>`;
}

function renderVocab(){
  document.getElementById('ctab-vocab').innerHTML=`
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">Click a term to reveal its definition.</p>
    <div>${currentPeriod.vocab.map((v,i)=>`<div class="vocab-item" id="vi-${i}" onclick="toggleVocab(${i})"><div class="vocab-term">${v.term}</div><div class="vocab-def" id="vdef-${i}">${v.def}</div></div>`).join('')}</div>`;
}

function toggleVocab(i){
  const def=document.getElementById('vdef-'+i);
  const item=document.getElementById('vi-'+i);
  def.classList.toggle('shown');
  item.classList.toggle('open');
}

function renderQuiz(){
  const p=currentPeriod;
  const key='p'+p.id;
  if(!quizState[key]) quizState[key]={idx:0,score:0,answered:false};
  const qs=quizState[key];
  const q=p.quiz[qs.idx];
  const pct=Math.round((qs.idx/p.quiz.length)*100);
  document.getElementById('ctab-quiz').innerHTML=`
    <div class="q-card">
      <div class="q-meta">
        <span class="q-counter">Question ${qs.idx+1} of ${p.quiz.length}</span>
        <span class="q-score">Score: ${qs.score} / ${p.quiz.length}</span>
      </div>
      <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">${q.opts.map((opt,i)=>`<button class="q-opt" id="opt-${i}" onclick="answerQuiz(${i})">${opt}</button>`).join('')}</div>
      <div class="q-feedback" id="q-feedback"></div>
      <div class="q-nav">
        <button class="btn btn-primary" id="q-next-btn" style="display:none;" onclick="nextQuestion()">Next question →</button>
        <span></span>
      </div>
    </div>`;
}

function answerQuiz(chosen){
  const p=currentPeriod;const key='p'+p.id;const qs=quizState[key];
  if(qs.answered) return;
  qs.answered=true;
  const q=p.quiz[qs.idx];
  const correct=q.ans===chosen;
  if(correct) qs.score++;
  document.querySelectorAll('.q-opt').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.ans) btn.classList.add('correct');
    else if(i===chosen&&!correct) btn.classList.add('wrong');
  });
  const fb=document.getElementById('q-feedback');
  fb.textContent=(correct?'Correct! ':'Incorrect. ')+q.exp;
  fb.className='q-feedback show '+(correct?'correct-fb':'wrong-fb');
  document.getElementById('q-next-btn').style.display='inline-block';
}

function nextQuestion(){
  const p=currentPeriod;const key='p'+p.id;const qs=quizState[key];
  qs.idx++;qs.answered=false;
  if(qs.idx>=p.quiz.length){
    const pct=Math.round((qs.score/p.quiz.length)*100);
    document.getElementById('ctab-quiz').innerHTML=`
      <div class="results-card">
        <div class="results-score">${qs.score}/${p.quiz.length}</div>
        <div class="results-pct">${pct}% correct</div>
        <div class="results-msg">${pct===100?'Perfect score! Outstanding work.':pct>=80?'Excellent — you know this period well.':pct>=60?'Good effort — review the explanations above.':'Keep studying this period and try again.'}</div>
        <button class="btn btn-primary" onclick="resetQuiz()">Try again</button>
      </div>`;
  } else {renderQuiz();}
}

function resetQuiz(){quizState['p'+currentPeriod.id]={idx:0,score:0,answered:false};renderQuiz();}

function renderPrompts(filter){
  const filtered=filter==='all'?practicePrompts:practicePrompts.filter(p=>p.skill===filter||p.type===filter);
  document.getElementById('prompts-content').innerHTML=`
    <div style="margin-bottom:1.25rem;">
      <div class="section-label">Filter by skill / type</div>
      <div class="filter-row">${['all','CCOT','Causation','Comparison','DBQ','LEQ'].map(f=>`<button class="filter-btn${filter===f?' active':''}" onclick="renderPrompts('${f}')">${f}</button>`).join('')}</div>
    </div>
    <div>${filtered.map(pr=>`
      <div class="prompt-box">
        <div class="prompt-text">${pr.text}</div>
        <div class="prompt-meta">
          <span class="prompt-tag skill-tag">${pr.skill}</span>
          <span class="prompt-tag type-tag">${pr.type}</span>
          <span class="prompt-tag period-tag">Period ${pr.period}</span>
        </div>
        <div class="section-label" style="margin-bottom:8px;">Writing hints</div>
        <div>${pr.hints.map(h=>`<div class="hint-item">${h}</div>`).join('')}</div>
      </div>`).join('')}</div>`;
}

function renderChecklists(){
  const allLists=[{id:'dbq',title:'DBQ Writing Checklist',pts:'7 points possible',cats:dbqChecklist},{id:'leq',title:'LEQ Writing Checklist',pts:'6 points possible',cats:leqChecklist},{id:'saq',title:'SAQ Writing Checklist',pts:'3 points possible',cats:saqChecklist}];
  if(!checkStates.dbq){
    allLists.forEach(l=>{checkStates[l.id]={};l.cats.forEach((cat,ci)=>{cat.items.forEach((_,ii)=>{checkStates[l.id][`${ci}-${ii}`]=false;});});});
  }
  const total=s=>Object.keys(s).length;
  const done=s=>Object.values(s).filter(Boolean).length;
  document.getElementById('checklists-content').innerHTML=allLists.map(l=>{
    const t=total(checkStates[l.id]);const d=done(checkStates[l.id]);const pct=t>0?Math.round((d/t)*100):0;
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);">
        <div>
          <div style="font-size:15px;font-weight:600;">${l.title}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${l.pts} — ${d}/${t} items checked</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span style="font-size:14px;font-weight:600;color:${pct===100?'var(--green-text)':'var(--text2)'};">${pct}%</span>
          <button class="btn btn-sm" onclick="resetChecklist('${l.id}')">Reset</button>
        </div>
      </div>
      <div class="progress-wrap" style="margin-bottom:1.25rem;"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${l.cats.map((cat,ci)=>`
        <div style="margin-bottom:16px;">
          <div class="section-label">${cat.cat}</div>
          ${cat.items.map((item,ii)=>`
            <div class="checklist-item" onclick="toggleCheck('${l.id}',${ci},${ii})">
              <div class="check-box${checkStates[l.id][ci+'-'+ii]?' done':''}"><div class="check-mark"></div></div>
              <div class="check-label${checkStates[l.id][ci+'-'+ii]?' done':''}">${item}</div>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;
  }).join('');
}

function toggleCheck(l,ci,ii){checkStates[l][`${ci}-${ii}`]=!checkStates[l][`${ci}-${ii}`];renderChecklists();}
function resetChecklist(l){Object.keys(checkStates[l]).forEach(k=>checkStates[l][k]=false);renderChecklists();}

function renderWriting(){
  document.getElementById('writing-content').innerHTML=`
    <div class="card"><h3>The 6-step writing model</h3>
    ${[["Analyze the prompt","Identify the historical skill (causation, comparison, or CCOT) and 2–3 BAGPIPE themes. For non-debatable 'Evaluate how…' prompts, state claims directly."],["Build your essay chart","T-chart or cause/effect chart. Group DBQ documents into 2 categories. Brainstorm 10+ outside facts, dates, people, and terms."],["Write the introduction","3–5 sentences introducing the subject. Explain what happened before the period (contextualization — the smaller picture)."],["Craft your thesis","Outline sub-topics and state your position. For causation: rank by importance. For CCOT: determine how much change occurred. Make a defensible claim, not a fact."],["Develop body paragraphs","3+ pieces of evidence per sub-topic. Use historical skill language ('changed/stayed the same' or 'caused/resulted in'). Include outside evidence and source 2–4 documents using HAPP."],["Write the conclusion","Summarize, offer counter-arguments or historiography, and connect to other time periods (synthesis). Aim for the complexity 'unicorn' point."]].map(([t,d],i)=>`<div class="step-row"><div class="step-num">${i+1}</div><div class="step-body"><strong>${t}:</strong> ${d}</div></div>`).join('')}
    </div>
    <div class="card"><h3>Thesis types</h3>
    ${[["Direct","A straightforward statement that clearly answers the question.","The precedents Washington set as America's first president greatly benefited the American political system."],["Compound","Proves two related points using 'and.'","Jacksonians portrayed themselves as guardians of American ideals and achieved remarkable success protecting those ideals."],["Complex-direct","Acknowledges counter-evidence using 'although.'","Although Jacksonians believed they were guardians of American ideals, their actions betrayed other priorities and rarely matched their rhetoric."],["Split","Breaks thesis into several categories matching essay structure.","To a large extent Jacksonians were not effective guardians of the Constitution, political democracy, individual liberty, or equality of economic opportunity."]].map(([type,desc,ex])=>`<div style="padding:11px 14px;background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;"><div style="font-size:13px;font-weight:600;margin-bottom:3px;">${type}</div><div style="font-size:12px;color:var(--text2);margin-bottom:8px;">${desc}</div><div style="font-size:13px;font-style:italic;border-left:3px solid var(--border2);padding-left:10px;line-height:1.6;">"${ex}"</div></div>`).join('')}
    </div>
    <div class="card"><h3>DBQ scoring rubric — 7 points</h3>
    <table class="rubric-table"><thead><tr><th>Category</th><th>What earns the point</th><th>Pts</th></tr></thead><tbody>
    ${[["Thesis","Defensible claim addressing all parts of the question — not just a restatement.","1"],["Contextualization","Accurately connects broader historical content to the smaller picture of the period.","1"],["Evidence (docs)","Uses 3+ docs to address the topic (1 pt); uses 4+ docs to support thesis (1 pt).","2"],["Outside evidence","At least one specific piece of evidence beyond the documents, relevant to the argument.","1"],["Sourcing","Explains how/why POV, purpose, context, or audience is relevant for at least 2 documents.","1"],["Complexity (unicorn)","Counter-argument, synthesis, historiography, all 7 docs used, or 4 documents sourced.","1"]].map(([cat,desc,pts])=>`<tr><td style="font-weight:600;white-space:nowrap;">${cat}</td><td>${desc}</td><td><span class="pt-badge">${pts}</span></td></tr>`).join('')}
    </tbody></table></div>
    <div class="card"><h3>LEQ scoring rubric — 6 points</h3>
    <table class="rubric-table"><thead><tr><th>Category</th><th>What earns the point</th><th>Pts</th></tr></thead><tbody>
    ${[["Thesis","Clear, defensible claim with a line of reasoning that answers the prompt.","1"],["Contextualization","Describes broader historical context accurately and connects it to the argument.","1"],["Evidence","1 pt: 2+ specific examples. 2 pts: evidence fully supports the stated thesis.","2"],["Analysis & reasoning","Uses the required historical skill (causation, comparison, or CCOT) to frame the argument.","1"],["Complexity (unicorn)","Counter-argument, synthesis, historiography, or use of multiple historical skills.","1"]].map(([cat,desc,pts])=>`<tr><td style="font-weight:600;white-space:nowrap;">${cat}</td><td>${desc}</td><td><span class="pt-badge">${pts}</span></td></tr>`).join('')}
    </tbody></table></div>
    <div class="card"><h3>SAQ — the ACE method (3 points)</h3>
    ${[["A — Answer","Directly answer the question in your first sentence. Restate the prompt in your own words."],["C — Cite evidence","Provide one specific piece of historical evidence (event, person, law, term) that supports your answer."],["E — Explain","Explain how your evidence directly proves your answer. Connect explicitly back to the question."]].map(([t,d],i)=>`<div class="step-row"><div class="step-num" style="background:var(--green-bg);color:var(--green-text);">${["A","C","E"][i]}</div><div class="step-body"><strong>${t}:</strong> ${d}</div></div>`).join('')}
    </div>
    <div class="card"><h3>Sourcing documents — HAPP</h3>
    ${[["Historical context","What events or processes in this document's time period shaped what the author wrote?"],["Audience","Who was this written for, and how does that shape its content and emphasis?"],["Purpose","Why was this document created? What was the author trying to accomplish?"],["Point of view (POV)","How does the author's background, identity, or position shape their perspective?"]].map(([t,d])=>`<div style="padding:11px 14px;background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;"><div style="font-size:13px;font-weight:600;margin-bottom:4px;">${t}</div><div style="font-size:13px;color:var(--text2);line-height:1.55;">${d}</div></div>`).join('')}
    </div>
    <div class="card"><h3>The complexity ("unicorn") point</h3>
    <p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;">The unicorn point rewards essays that demonstrate genuine analytical complexity. Choose one of these approaches for your conclusion:</p>
    ${[["Counter-argument","Acknowledge evidence that challenges your thesis, then explain why your argument still holds. Use the 'although' in your complex thesis."],["Synthesis","Connect the historical issue to a different time period or place — be VERY specific. Vague parallels to 'today' do not earn the point."],["Historiography","Explain how different historians would interpret the evidence. Reference Zinn (liberal/social history), Schweikart (conservative), Great Man Theory, or Great Events Theory."],["Use all 7 documents (DBQ)","Correctly use all 7 documents in your argument — not just mention them — to demonstrate comprehensive mastery of the sources."],["Source 4 documents (DBQ)","Correctly attribute HAPP for 4 documents, going beyond the 2 required for the sourcing point."]].map(([t,d])=>`<div style="padding:11px 14px;background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;"><div style="font-size:13px;font-weight:600;margin-bottom:4px;">${t}</div><div style="font-size:13px;color:var(--text2);line-height:1.55;">${d}</div></div>`).join('')}
    </div>`;
}

function renderThemes(){
  const bg=[{l:"B",n:"Beliefs — Culture & Society",d:"How moral, philosophical, and cultural values changed in American history and their effects on society and politics."},{l:"A",n:"America in the World",d:"How U.S. events relate to global developments; military, diplomatic, and economic involvement internationally."},{l:"G",n:"Geography & Environment",d:"How the natural environment shaped institutions and values; how economic changes affected the environment."},{l:"P",n:"Politics & Power",d:"How political and social groups competed for influence over society and government; debates over the role of government."},{l:"I",n:"American & National Identity",d:"How debates over national identity changed over time; how gender, class, ethnic, and regional identities evolved."},{l:"P",n:"Peopling — Migration",d:"Why people migrated to, from, and within North America; how changes in migration patterns affected American life."},{l:"E",n:"Economics — Work, Exchange, Tech",d:"How markets, transportation, and technology affected society; how different labor systems developed and evolved."}];
  document.getElementById('bagpipe-content').innerHTML=bg.map(b=>`<div class="bagpipe-item"><div class="bagpipe-letter">${b.l}</div><div class="bagpipe-name">${b.n}</div><div class="bagpipe-desc">${b.d}</div></div>`).join('');
}

function renderSkills(){
  const sk=[{name:"Historical Causation",type:"Chronological Reasoning",desc:"Compare causes and effects (short-term vs. long-term). Analyze multiple interacting causes. Distinguish coincidence, correlation, and causation. Assess historical contingency."},{name:"Continuity & Change Over Time (CCOT)",type:"Chronological Reasoning",desc:"Analyze historical patterns of continuity and change. Connect patterns of continuity and change to larger historical processes or themes."},{name:"Comparison",type:"Comparison & Contextualization",desc:"Compare related historical developments and processes across place, time, and different societies. Explain and evaluate multiple and differing perspectives on a given historical phenomenon."},{name:"Contextualization",type:"Comparison & Contextualization",desc:"Connect specific historical phenomena, events, or processes to broader regional, national, or global processes occurring at the same time. Connect phenomena to similar historical events across time and place."},{name:"Historical Argumentation",type:"Crafting Arguments from Evidence",desc:"Analyze commonly accepted historical arguments and how they were constructed. Construct convincing interpretations through analysis of disparate, relevant historical evidence. Evaluate and synthesize conflicting evidence."},{name:"Appropriate Use of Historical Evidence",type:"Crafting Arguments from Evidence",desc:"Analyze features of historical evidence such as audience, purpose, point of view, format, argument, limitations, and context. Make supportable inferences and draw appropriate conclusions from evidence."},{name:"Interpretation",type:"Historical Interpretation",desc:"Analyze diverse historical interpretations. Evaluate how historians' perspectives influence their interpretations and how models of historical interpretation change over time."}];
  const types=[...new Set(sk.map(s=>s.type))];
  document.getElementById('skills-content').innerHTML=types.map(type=>`
    <div style="margin-bottom:1.75rem;">
      <div class="section-label">${type}</div>
      ${sk.filter(s=>s.type===type).map(s=>`<div style="padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;"><div style="font-size:13px;font-weight:600;margin-bottom:5px;">${s.name}</div><div style="font-size:13px;color:var(--text2);line-height:1.6;">${s.desc}</div></div>`).join('')}
    </div>`).join('');
}

renderPeriodCards();
</script>
