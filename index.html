<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APUSH Review — All 9 Periods</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a1a;
    --text2: #666660;
    --text3: #999992;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --blue-mid: #185FA5;
    --green-bg: #eaf3de;
    --green-text: #27500a;
    --red-bg: #fcebeb;
    --red-text: #791f1f;
    --amber-bg: #faeeda;
    --amber-text: #633806;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe8;
      --text2: #aaa89e;
      --text3: #777770;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --blue-bg: #0c2d4a;
      --blue-text: #85b7eb;
      --blue-mid: #378add;
      --green-bg: #173404;
      --green-text: #c0dd97;
      --red-bg: #501313;
      --red-text: #f09595;
      --amber-bg: #412402;
      --amber-text: #fac775;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .app { max-width: 960px; margin: 0 auto; padding: 1rem 1rem 4rem; }
  .header { text-align: center; padding: 2.5rem 1rem 1.5rem; }
  .header h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.5px; }
  .header p { color: var(--text2); font-size: 15px; margin-top: 6px; }
  .nav-tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; padding: 0 0.5rem; }
  .tab-btn { font-size: 13px; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .tab-btn:hover { background: var(--bg2); }
  .tab-btn.active { background: var(--blue-mid); color: #e6f1fb; border-color: var(--blue-mid); }
  .section { display: none; } .section.active { display: block; }
  .period-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .period-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: all 0.15s; }
  .period-card:hover { border-color: var(--border2); background: var(--bg2); transform: translateY(-1px); }
  .period-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; background: var(--blue-bg); color: var(--blue-text); display: inline-block; margin-bottom: 8px; }
  .period-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .period-card .dates { font-size: 12px; color: var(--text2); }
  .period-card .summary { font-size: 12px; color: var(--text3); line-height: 1.5; margin-top: 6px; }
  .period-detail { display: none; } .period-detail.active { display: block; }
  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .back-btn { font-size: 13px; padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .back-btn:hover { background: var(--bg2); }
  #detail-title { font-size: 15px; font-weight: 600; }
  .content-tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .ctab { font-size: 13px; padding: 9px 16px; border: none; background: none; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: all 0.15s; }
  .ctab:hover { color: var(--text); }
  .ctab.active { color: var(--blue-mid); border-bottom-color: var(--blue-mid); font-weight: 600; }
  .ctab-content { display: none; } .ctab-content.active { display: block; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 14px; }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .key-events { display: flex; flex-direction: column; gap: 8px; }
  .event-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); }
  .event-year { font-size: 12px; font-weight: 600; color: var(--blue-mid); min-width: 46px; padding-top: 1px; }
  .event-text { font-size: 13px; line-height: 1.5; }
  .vocab-item { padding: 10px 14px; background: var(--bg2); border-radius: var(--radius); cursor: pointer; margin-bottom: 8px; border: 1px solid transparent; transition: border-color 0.15s; }
  .vocab-item:hover { border-color: var(--border2); }
  .vocab-term { font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .vocab-term::after { content: '+'; font-size: 16px; color: var(--text3); font-weight: 400; }
  .vocab-item.open .vocab-term::after { content: '−'; }
  .vocab-def { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.6; display: none; }
  .vocab-def.shown { display: block; }
  .q-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .q-counter { font-size: 12px; color: var(--text2); }
  .q-score { font-size: 13px; font-weight: 600; color: var(--text2); }
  .progress-wrap { height: 5px; background: var(--bg2); border-radius: 3px; margin-bottom: 1.25rem; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--blue-mid); transition: width 0.3s; }
  .q-text { font-size: 15px; line-height: 1.65; margin-bottom: 1.25rem; font-weight: 500; }
  .q-options { display: flex; flex-direction: column; gap: 9px; }
  .q-opt { padding: 11px 15px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); cursor: pointer; font-size: 13px; text-align: left; font-family: inherit; color: var(--text); transition: all 0.15s; line-height: 1.5; }
  .q-opt:hover:not(:disabled) { background: var(--bg2); border-color: var(--blue-mid); }
  .q-opt.correct { background: var(--green-bg); border-color: #3b6d11; color: var(--green-text); }
  .q-opt.wrong { background: var(--red-bg); border-color: #a32d2d; color: var(--red-text); }
  .q-feedback { margin-top: 1rem; padding: 11px 14px; border-radius: var(--radius); font-size: 13px; line-height: 1.6; display: none; }
  .q-feedback.show { display: block; }
  .q-feedback.correct-fb { background: var(--green-bg); color: var(--green-text); border: 1px solid #3b6d11; }
  .q-feedback.wrong-fb { background: var(--red-bg); color: var(--red-text); border: 1px solid #a32d2d; }
  .q-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; flex-wrap: wrap; gap: 8px; }
  .btn { font-size: 13px; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--blue-mid); color: #e6f1fb; border-color: var(--blue-mid); }
  .btn-primary:hover { opacity: 0.9; background: var(--blue-mid); }
  .btn-sm { font-size: 11px; padding: 4px 10px; }
  .step-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--blue-bg); color: var(--blue-text); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-body { font-size: 13px; line-height: 1.65; }
  .step-body strong { font-weight: 600; }
  .rubric-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rubric-table th { padding: 9px 11px; text-align: left; font-weight: 600; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .rubric-table td { padding: 9px 11px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
  .pt-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: var(--blue-bg); color: var(--blue-text); font-weight: 600; display: inline-block; }
  .bagpipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .bagpipe-item { padding: 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); }
  .bagpipe-letter { font-size: 28px; font-weight: 700; color: var(--blue-mid); margin-bottom: 4px; }
  .bagpipe-name { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  .bagpipe-desc { font-size: 12px; color: var(--text2); line-height: 1.55; }
  .checklist-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; margin-bottom: 4px; transition: background 0.1s; }
  .checklist-item:hover { background: var(--bg2); }
  .check-box { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.15s; }
  .check-box.done { background: var(--blue-mid); border-color: var(--blue-mid); }
  .check-mark { width: 10px; height: 7px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translateY(-2px); display: none; }
  .check-box.done .check-mark { display: block; }
  .check-label { font-size: 13px; line-height: 1.5; }
  .check-label.done { text-decoration: line-through; color: var(--text3); }
  .prompt-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 14px; }
  .prompt-text { font-size: 15px; font-weight: 600; line-height: 1.6; margin-bottom: 10px; }
  .prompt-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .prompt-tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 600; }
  .skill-tag { background: var(--blue-bg); color: var(--blue-text); }
  .type-tag { background: var(--amber-bg); color: var(--amber-text); }
  .period-tag { background: var(--green-bg); color: var(--green-text); }
  .hint-item { font-size: 12px; color: var(--text2); line-height: 1.55; padding: 5px 10px; border-left: 3px solid var(--border2); margin-bottom: 5px; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1.25rem; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .filter-btn:hover { background: var(--bg2); }
  .filter-btn.active { background: var(--blue-mid); color: #e6f1fb; border-color: var(--blue-mid); }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); margin-bottom: 10px; }
  .kt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .kt-chip { padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; line-height: 1.4; }
  .kt-group { margin-bottom: 18px; }
  .kt-group-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--blue-text); background: var(--blue-bg); display: inline-block; padding: 3px 8px; border-radius: 6px; margin-bottom: 10px; }
  .results-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; text-align: center; }
  .results-score { font-size: 48px; font-weight: 700; margin-bottom: 4px; }
  .results-pct { font-size: 15px; color: var(--text2); margin-bottom: 8px; }
  .results-msg { font-size: 14px; margin-bottom: 1.5rem; }
  .themes-section { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .theme-row { display: flex; gap: 10px; align-items: flex-start; }
  .theme-num { font-size: 11px; background: var(--blue-bg); color: var(--blue-text); padding: 2px 7px; border-radius: 10px; margin-top: 2px; white-space: nowrap; font-weight: 600; }
  .theme-text { font-size: 13px; line-height: 1.6; }
  @media (max-width: 600px) {
    .period-grid { grid-template-columns: 1fr 1fr; }
    .q-text { font-size: 14px; }
    .header h1 { font-size: 24px; }
  }
  @media (max-width: 420px) {
    .period-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>APUSH Review</h1>
    <p>AP U.S. History — All 9 Periods + Writing Tools</p>
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showSection('periods',this)">Periods</button>
    <button class="tab-btn" onclick="showSection('prompts',this)">Practice Prompts</button>
    <button class="tab-btn" onclick="showSection('writing',this)">Writing Guide</button>
    <button class="tab-btn" onclick="showSection('checklists',this)">Checklists</button>
    <button class="tab-btn" onclick="showSection('themes',this)">BAGPIPE</button>
    <button class="tab-btn" onclick="showSection('skills',this)">Skills</button>
  </div>
  <div id="section-periods" class="section active">
    <div id="period-list"><div class="period-grid" id="period-cards"></div></div>
    <div id="period-detail" class="period-detail">
      <div class="detail-header">
        <button class="back-btn" onclick="backToPeriods()">← All Periods</button>
        <span id="detail-title"></span>
      </div>
      <div class="content-tabs">
        <button class="ctab active" onclick="showCtab('overview',this)">Overview</button>
        <button class="ctab" onclick="showCtab('events',this)">Key Events</button>
        <button class="ctab" onclick="showCtab('keyterms',this)">Key Terms</button>
        <button class="ctab" onclick="showCtab('vocab',this)">Vocabulary</button>
        <button class="ctab" onclick="showCtab('quiz',this)">Quiz (15 Qs)</button>
      </div>
      <div id="ctab-overview" class="ctab-content active"></div>
      <div id="ctab-events" class="ctab-content"></div>
      <div id="ctab-keyterms" class="ctab-content"></div>
      <div id="ctab-vocab" class="ctab-content"></div>
      <div id="ctab-quiz" class="ctab-content"></div>
    </div>
  </div>
  <div id="section-prompts" class="section"><div id="prompts-content"></div></div>
  <div id="section-writing" class="section"><div id="writing-content"></div></div>
  <div id="section-checklists" class="section"><div id="checklists-content"></div></div>
  <div id="section-themes" class="section"><div class="bagpipe-grid" id="bagpipe-content"></div></div>
  <div id="section-skills" class="section"><div id="skills-content"></div></div>
</div>

<script>
const Q=(q,o,a,e)=>({q,opts:o,ans:a,exp:e});

const periods=[
 {id:1,dates:"1491–1607",title:"Pre-Columbian & Contact",summary:"Native societies, European exploration, and early encounters between worlds.",
  themes:["Diverse Native American societies shaped by geography and environment","European motives: God, Glory, Gold","Columbian Exchange transformed both hemispheres","Early Spanish, French, and English colonization patterns differ significantly"],
  events:[{year:"~1000",text:"Norse explorer Leif Eriksson reaches North America at Vinland"},{year:"1492",text:"Columbus lands in the Caribbean, initiating sustained contact between hemispheres"},{year:"1494",text:"Treaty of Tordesillas divides the New World between Spain and Portugal"},{year:"1519",text:"Hernán Cortés begins conquest of the Aztec Empire"},{year:"1521",text:"Fall of Tenochtitlan; Spanish establish New Spain"},{year:"1542",text:"Las Casas publishes condemnation of Spanish treatment of Native Americans"},{year:"1565",text:"St. Augustine, Florida founded — oldest European settlement in North America"},{year:"1587",text:"Lost Colony of Roanoke established by England"}],
  keyterms:[
   {group:"Native American Regional Societies",terms:["Southwest → Pueblos","Great Plains → Sioux","Mississippi River Valley → Cahokia","Atlantic Seaboard → Iroquois or Cherokee","Northwest → Chinook or Nez Perce"]},
   {group:"European Colonization",terms:["Spanish/Portuguese Colonization (Economic, Political, Religious)","Columbian Exchange","Joint-Stock Company","Encomienda System","Slave Trade","Caste System","Mestizo"]},
   {group:"Contact & Conflict",terms:["Native American vs. European views (religion, land ownership)","Oñate and Spanish missions","Pueblo Wars / Pope's Rebellion (1680)"]}
  ],
  vocab:[{term:"Columbian Exchange",def:"The transfer of plants, animals, diseases, and ideas between the Americas and Europe/Africa following Columbus's voyages."},{term:"Encomienda System",def:"Spanish labor system granting conquistadors the right to demand labor or tribute from Native peoples."},{term:"Mestizo",def:"Person of mixed European and Native American ancestry in Spanish colonial society."},{term:"Three Sisters",def:"Corn, beans, and squash — the core agricultural crops of many Native societies."},{term:"Casta System",def:"Spanish colonial racial hierarchy determining social status based on racial ancestry."},{term:"Treaty of Tordesillas",def:"1494 agreement dividing newly discovered lands between Spain and Portugal along a set meridian line."}],
  quiz:[
   Q("Which of the following best describes the Columbian Exchange?",["A military alliance between Spain and Portugal","The transfer of goods, diseases, and ideas between the Old and New Worlds","The trade route Columbus used to reach Asia","A treaty dividing the Americas between European powers"],1,"The Columbian Exchange refers to the widespread transfer of plants, animals, diseases, culture, and ideas between the Americas and Afro-Eurasia following Columbus's 1492 voyage."),
   Q("The encomienda system primarily served to:",["Protect Native Americans from abuse","Provide labor for Spanish colonists","Establish trade routes to Asia","Convert Protestants to Catholicism"],1,"The encomienda granted colonizers the right to extract labor from Native peoples, leading to widespread exploitation and population collapse."),
   Q("Which factor most contributed to the rapid decline of Native American populations after 1492?",["Warfare with European settlers","Forced labor in mines","Epidemic diseases like smallpox","Destruction of agricultural lands"],2,"European diseases — smallpox, measles, influenza — to which Natives had no immunity caused catastrophic population loss estimated at 50–90%."),
   Q("The Spanish mission system in North America was primarily designed to:",["Exploit mineral wealth","Convert and control Native American populations","Establish trade networks with Asia","Prepare for war with France"],1,"Missions sought to convert Natives to Catholicism, make them loyal Spanish subjects, and extract their labor — serving both religious and imperial goals."),
   Q("How did Native American societies in the Eastern Woodlands differ from those of the Southwest?",["Eastern societies were nomadic while Southwest societies were sedentary","Eastern societies relied on agriculture less than Southwest Pueblo peoples","Eastern societies were larger and more hierarchical","Eastern societies had no contact with Europeans until the 1700s"],1,"Pueblo peoples built permanent towns relying heavily on agriculture, while many Eastern Woodlands groups combined agriculture with hunting and gathering in less densely settled areas."),
   Q("Bartolomé de las Casas is significant in this period primarily because he:",["Led the conquest of the Aztecs","Documented and protested Spanish abuse of Native Americans","Established the encomienda system","Negotiated the Treaty of Tordesillas"],1,"Las Casas was one of the earliest and most vocal critics of brutal Native treatment under Spanish colonialism, influencing the New Laws of 1542."),
   Q("Which European nation established the first permanent settlement in what is now the United States?",["England","France","Portugal","Spain"],3,"Spain established St. Augustine, Florida in 1565 — the oldest continuously occupied European settlement in the present-day United States."),
   Q("The primary motivation for Spanish conquest of the Americas is best described as:",["Spreading democracy to indigenous peoples","Religious conversion, wealth extraction, and imperial glory","Scientific exploration and mapmaking","Establishing democratic republics"],1,"Spanish conquistadors were driven by the '3 Gs' — God (religious conversion), Glory (status), and Gold (wealth)."),
   Q("What was the significance of the Treaty of Tordesillas (1494)?",["It ended the Reconquista in Spain","It divided newly discovered lands between Spain and Portugal along a set meridian","It gave England the right to colonize North America","It established the encomienda system"],1,"The treaty split the non-European world between Spain (west) and Portugal (east), attempting to prevent conflict between the two Catholic powers over colonial territories."),
   Q("Which best describes the variety of Native American societies before European contact?",["All Native societies were nomadic hunter-gatherers","Native societies were largely uniform across the continent","Native societies were highly diverse, shaped by geography and environment","Most Native societies were organized into large centralized empires"],2,"Native North America featured enormous diversity — from complex Mississippian urban societies to nomadic Plains peoples to the agricultural Pueblo communities of the Southwest."),
   Q("The Columbian Exchange most negatively affected which group?",["European merchants","Spanish colonizers","Native Americans","African traders"],2,"Native Americans suffered catastrophic population decline primarily from epidemic diseases, losing an estimated 50–90% of their population within a century of contact."),
   Q("How did the Spanish justify their conquest and colonization of the Americas?",["Through secular democratic principles","Through the Reconquista military tradition alone","Through religious arguments that Natives needed Christian salvation","Through purely economic arguments about trade"],2,"The Spanish used the Doctrine of Discovery and papal authority to argue they had a religious duty to bring Christianity to Native peoples, providing moral justification for conquest."),
   Q("Which was a major consequence of the encomienda system?",["Native populations grew rapidly under Spanish protection","It led to near-extinction of Native labor, prompting importation of enslaved Africans","It successfully converted the entire Native population to Christianity","It created a prosperous middle class of mixed-race mestizos"],1,"As Native populations collapsed under the encomienda, Spanish colonizers increasingly turned to enslaved African labor to sustain their colonial economy."),
   Q("The Pueblo Revolt of 1680 is best understood as:",["A Spanish-initiated reform of the mission system","A successful Native uprising driving the Spanish from New Mexico for over a decade","A conflict between rival Native tribes","A failed revolt quickly suppressed by Spanish forces"],1,"The Pueblo Revolt was a successful coordinated uprising that drove the Spanish out of New Mexico for 12 years — demonstrating significant Native capacity for resistance."),
   Q("Which best explains why European diseases spread so rapidly among Native Americans?",["Native Americans had weakened immune systems from poor nutrition","Native Americans lacked prior exposure and had no natural immunity to Old World diseases","European diseases were engineered to target specific populations","Native Americans refused medical treatment from missionaries"],1,"Thousands of years of geographic isolation meant Native peoples had never been exposed to diseases like smallpox or measles, leaving them with devastating vulnerability.")
  ]},
 {id:2,dates:"1607–1754",title:"Colonial America",summary:"British colonial establishment, regional differences, and the roots of American identity.",
  themes:["New England, Middle, and Southern colonies develop distinct societies","Indentured servitude transitions to African chattel slavery","Salutary neglect allows colonial self-governance to develop","Great Awakening creates religious diversity and individualism"],
  events:[{year:"1607",text:"Jamestown, Virginia founded — first permanent English settlement"},{year:"1619",text:"First enslaved Africans arrive in Virginia; House of Burgesses established"},{year:"1620",text:"Pilgrims arrive at Plymouth; Mayflower Compact signed"},{year:"1630",text:"Puritans establish Massachusetts Bay Colony under John Winthrop"},{year:"1676",text:"Bacon's Rebellion — uprising of poor farmers and indentured servants in Virginia"},{year:"1681",text:"William Penn founds Pennsylvania as a Quaker colony"},{year:"1692",text:"Salem Witch Trials in Massachusetts"},{year:"1730s–40s",text:"Great Awakening sweeps through the colonies with evangelical revivalism"},{year:"1739",text:"Stono Rebellion — largest slave uprising in colonial America"}],
  keyterms:[

  vocab:[{term:"Salutary Neglect",def:"Informal British policy allowing colonies to govern themselves with minimal interference, fostering self-governance traditions."},{term:"Headright System",def:"Virginia land grant system awarding 50 acres per person brought to the colony, encouraging immigration."},{term:"Indentured Servitude",def:"Labor system where individuals worked for a set number of years in exchange for passage to the colonies."},{term:"Chattel Slavery",def:"System in which enslaved people are treated as property and enslaved status is inherited by children."},{term:"Great Awakening",def:"Religious revival movement of the 1730s–40s emphasizing personal conversion and challenging church authority."},{term:"Navigation Acts",def:"British laws restricting colonial trade to benefit England's mercantilist economy."}],
  quiz:[
   Q("Bacon's Rebellion (1676) is significant primarily because it:",["Led to independence from Britain","Revealed class tensions and accelerated the shift to African slavery","Established the first colonial legislature","Ended conflict with Native Americans in Virginia"],1,"Bacon's Rebellion exposed the danger of a large class of poor, discontented indentured servants. Planters shifted to African slave labor, seen as a more controllable permanent workforce."),
   Q("The policy of salutary neglect allowed for:",["Increased taxation of the colonies","Greater colonial self-governance and assemblies","Forced religious conformity in the colonies","Expansion of the slave trade"],1,"Under salutary neglect, Britain allowed colonists to largely govern themselves, strengthening colonial assemblies and self-governance habits that later fueled revolutionary ideas."),
   Q("Which colonial region was most characterized by religious diversity and middle-class merchants?",["New England","The Middle Colonies","The Southern Colonies","The Chesapeake"],1,"The Middle Colonies (NY, NJ, PA, DE) were the most ethnically and religiously diverse, home to Quakers, Dutch Reformed, and other groups, as well as thriving merchant communities."),
   Q("The Puritan concept of a 'City upon a Hill' expressed the idea that:",["Boston should become the colonial capital","The Massachusetts colony would serve as a moral model for the world","Puritans were superior to other colonists","Church and state should be completely separated"],1,"John Winthrop's phrase meant the Puritan community would be watched as an example of godly society — blending religious mission with a sense of special American destiny."),
   Q("The Stono Rebellion of 1739 most directly resulted in:",["Improved conditions for enslaved people","Stricter slave codes and increased restrictions on enslaved people","Abolition of the slave trade in South Carolina","Greater political rights for free Black colonists"],1,"In the aftermath of Stono, South Carolina passed harsher slave codes restricting the movement, education, and assembly of enslaved people."),
   Q("How did the Great Awakening affect colonial society?",["It unified all colonists under one Protestant denomination","It reinforced established church authority","It challenged church authority and encouraged individual religious experience","It had little impact outside New England"],2,"The Great Awakening encouraged emotional, personal religious experience, undermined established church authority, and spread democratic religious ideas — foreshadowing revolutionary thought."),
   Q("The headright system in Virginia primarily encouraged:",["Religious freedom for settlers","Large-scale immigration by linking land grants to bringing new settlers","Small farmers to purchase land cheaply","English merchants to invest in the colony"],1,"The headright system awarded 50 acres per person brought to Virginia, incentivizing wealthy planters to import indentured servants and enslaved people, concentrating land in elite hands."),
   Q("Which best explains the transition from indentured servitude to African chattel slavery in the Chesapeake?",["Indentured servants were more expensive than enslaved Africans","Fear of armed, freed indentured servants created demand for a permanent, controllable labor force","England banned indentured servitude after Bacon's Rebellion","Africans were considered better agricultural workers"],1,"After Bacon's Rebellion, planters feared the growing population of freed, armed, discontented ex-servants. Enslaved Africans, as permanent and hereditary property, offered greater long-term control."),
   Q("The Mayflower Compact (1620) is historically significant because it:",["Established the first elected legislature in the colonies","Was the first written framework for self-government in British North America","Granted religious freedom to all settlers","Established Plymouth as an official English colony"],1,"The Mayflower Compact was the first written agreement for self-governance in the English colonies, establishing the principle that government derives authority from the consent of the governed."),
   Q("New England colonies differed from Southern colonies most significantly in that:",["New England was more economically prosperous","New England was founded primarily for religious and community purposes rather than economic profit","New England had a larger enslaved population","New England had more conflict with Native Americans"],1,"New England colonies, especially the Puritan Massachusetts Bay Colony, were founded primarily on religious ideals and a desire to create godly communities — distinguishing them from profit-driven Chesapeake and Southern colonies."),
   Q("The Navigation Acts were designed primarily to:",["Protect colonial merchants from competition","Ensure that colonial trade benefited England's economy under mercantilism","Prevent smuggling of enslaved people","Regulate relations between colonists and Native Americans"],1,"The Navigation Acts required colonial goods to be shipped through England on English ships — ensuring that colonial trade generated wealth for England, a core principle of mercantilist economic theory."),
   Q("Which best describes the role of religion in early New England colonial life?",["Religion was kept strictly separate from government","Religious conformity was enforced and dissent was punished","Religious diversity was celebrated from the founding","Religion played a minor role compared to economic concerns"],1,"Puritan New England enforced strict religious conformity. Dissenters like Roger Williams and Anne Hutchinson were banished, reflecting the Puritan belief that community covenant with God required unity."),
   Q("The establishment of the House of Burgesses in 1619 is significant because it:",["Granted full voting rights to all male colonists","Was the first representative legislative assembly in the English colonies","Abolished indentured servitude in Virginia","Established separation of church and state"],1,"The House of Burgesses was the first representative assembly in the English colonies, establishing the precedent of elected self-governance central to colonial political identity."),
   Q("How did the economy of the Southern colonies differ from that of New England?",["Southern colonies relied on subsistence farms while New England had large plantations","Southern colonies developed plantation agriculture using enslaved labor while New England relied on trade and small farms","New England had a more prosperous economy","Southern colonists were generally more educated and urban"],1,"The Southern colonies developed plantation economies growing tobacco, rice, and indigo using enslaved African labor, while New England's economy centered on trade, fishing, and small family farms."),
   Q("The Salem Witch Trials of 1692 are best interpreted as evidence of:",["Widespread actual witchcraft practice in Puritan communities","Social tensions, religious anxieties, and the dangers of mass hysteria in a theocratic society","A deliberate political conspiracy by colonial elites","The declining influence of Puritanism in Massachusetts"],1,"The Salem Witch Trials reflected deep social tensions — between established families and newer settlers, between young women and patriarchal authority — amplified by religious anxiety and unstable political conditions.")
  ]},

  vocab:[{term:"Virtual Representation",def:"British argument that Parliament represented all subjects including colonists, regardless of whether they voted."},{term:"Natural Rights",def:"Enlightenment concept (Locke) that people possess inherent rights to life, liberty, and property that governments cannot take away."},{term:"Articles of Confederation",def:"First U.S. governing document (1781–89); created a weak central government with no taxing power or executive branch."},{term:"Federalists",def:"Supporters of the Constitution who favored a strong central government; argued their case in the Federalist Papers."},{term:"Anti-Federalists",def:"Opponents of the Constitution who feared tyranny and demanded a Bill of Rights to protect individual liberties."},{term:"Three-Fifths Compromise",def:"Constitutional provision counting enslaved people as 3/5 of a person for taxation and representation."}],
  quiz:[
   Q("The French and Indian War contributed to the American Revolution primarily by:",["Causing France to attack British colonies","Leaving Britain deeply in debt, leading to new colonial taxes","Increasing Native American power in the West","Convincing Britain to grant colonial self-rule"],1,"The war left Britain deeply indebted, prompting Parliament to tax the colonies. Colonists resisted these taxes as violations of their rights, escalating tensions toward revolution."),
   Q("The main weakness of the Articles of Confederation was that:",["It gave too much power to the president","It had no provisions for foreign policy","Congress lacked the power to tax or regulate commerce","It allowed states to print their own currency"],2,"Under the Articles, Congress could not levy taxes or regulate interstate commerce, creating economic chaos and inability to pay war debts — key reasons for the Constitutional Convention."),
   Q("The concept of 'checks and balances' in the Constitution was primarily designed to:",["Ensure equal representation for all states","Prevent any one branch of government from becoming too powerful","Speed up the legislative process","Protect the rights of individual citizens"],1,"Checks and balances distribute power among three branches so each can limit the others, preventing tyranny — reflecting Enlightenment fears of concentrated power."),
   Q("Which best explains why slavery was not abolished in the Constitution?",["Most Founders believed slavery was morally acceptable","Southern states threatened to refuse to ratify without protections for slavery","The Declaration of Independence had already addressed the issue","Northern states had no economic interest in ending slavery"],1,"The Constitutional Convention was a series of compromises. Southern states refused to join without slavery protections, producing the Three-Fifths Compromise and ban on ending the slave trade before 1808."),
   Q("The Proclamation of 1763 angered colonists primarily because it:",["Raised taxes without colonial consent","Banned westward expansion beyond the Appalachians","Required colonists to house British soldiers","Abolished colonial assemblies"],1,"After the French & Indian War, Britain prohibited settlement west of the Appalachians to avoid costly conflicts with Native Americans. Colonists who had fought expected access to western lands."),
   Q("Washington's Farewell Address warned against:",["A standing army and a navy","Permanent foreign alliances and political factions","Westward expansion","A strong executive branch"],1,"Washington warned that permanent foreign entanglements and partisan political parties would destabilize the republic — warnings that shaped early American foreign and domestic policy for decades."),
   Q("The Declaration of Independence's assertion that 'all men are created equal' was most contradicted by:",["The existence of state governments","The continued practice of slavery","The exclusion of women from voting","Both slavery and the exclusion of women"],3,"The Declaration's ideals directly contradicted both the institution of slavery and the exclusion of women from political participation — tensions that would define American history for generations."),
   Q("Shays' Rebellion (1786–87) was most significant because it:",["Proved the Articles of Confederation were adequate","Demonstrated the weakness of the Articles and accelerated calls for a new Constitution","Led directly to the Bill of Rights","Showed that democracy was incompatible with stability"],1,"Shays' Rebellion — a Massachusetts farmers' uprising against debt and taxation — alarmed elites who feared the Articles created too weak a central government, energizing the push for the Constitutional Convention."),
   Q("The Bill of Rights was added to the Constitution primarily to:",["Strengthen the power of the federal government","Address Anti-Federalist concerns about individual liberties","Clarify the rights of states","Define the separation of church and state"],1,"Anti-Federalists refused to support ratification without a Bill of Rights protecting individual liberties from potential federal overreach — a key compromise that secured ratification."),
   Q("The Great Compromise at the Constitutional Convention resolved the debate over:",["Slavery in new territories","Congressional representation between large and small states","The power of the executive branch","The ratification process for new states"],1,"The Great Compromise created a bicameral legislature: the Senate with equal state representation (favoring small states) and the House based on population (favoring large states)."),
   Q("The ideology of republicanism shaped the American Revolution primarily by:",["Calling for the abolition of all forms of hierarchy","Emphasizing civic virtue, public service, and the dangers of unchecked power","Supporting a strong monarchy with limited oversight","Treating revolution as primarily an economic struggle"],1,"Republicanism held that self-governance required virtuous citizens willing to sacrifice private interests for the common good, and that concentrated power inevitably led to tyranny."),
   Q("The Federalist Papers were written primarily to:",["Argue against ratification of the Constitution","Explain and defend the Constitution to skeptical New York voters","Propose amendments to the Articles of Confederation","Justify the American Revolution to European audiences"],1,"Alexander Hamilton, James Madison, and John Jay wrote the Federalist Papers to persuade New York — a key swing state — to ratify the Constitution by explaining the logic behind its structure."),
   Q("Marbury v. Madison (1803) established the principle of:",["Presidential power to remove judges","Judicial review — the Supreme Court's power to declare laws unconstitutional","Federal supremacy over state laws","Congressional oversight of the executive branch"],1,"Chief Justice John Marshall's ruling established judicial review, giving the Supreme Court the power to strike down laws that violated the Constitution — fundamentally shaping the balance of power."),
   Q("The XYZ Affair (1797–98) is best understood as an example of:",["American weakness in foreign policy","Diplomatic tensions threatening to pull the young republic into European conflicts","The success of Washington's neutrality policy","Congressional opposition to presidential war powers"],1,"The XYZ Affair — in which French agents demanded bribes from U.S. diplomats — inflamed anti-French sentiment and nearly drew the U.S. into war, demonstrating the vulnerability of the new republic."),
   Q("The Alien and Sedition Acts (1798) most directly demonstrated:",["The strength of American democracy and free speech","The tension between national security concerns and civil liberties","Bipartisan cooperation in the early republic","The effectiveness of the two-party system"],1,"The Alien and Sedition Acts criminalized criticism of the government and targeted immigrant communities, revealing how quickly the new republic could suppress the very liberties articulated in the Bill of Rights.")
  ]},

  vocab:[{term:"Market Revolution",def:"Transformation of the U.S. economy through industrialization, transportation improvements, and commercial agriculture in the early 1800s."},{term:"Nullification Crisis",def:"1832–33 conflict over South Carolina's attempt to nullify federal tariffs, testing federal supremacy."},{term:"Manifest Destiny",def:"Belief that the United States was divinely ordained to expand across North America to the Pacific Ocean."},{term:"Spoils System",def:"Jackson's practice of rewarding political supporters with government jobs, also called 'rotation in office.'"},{term:"Second Great Awakening",def:"Early 19th-century religious revival that fueled reform movements including abolitionism, temperance, and women's rights."},{term:"Trail of Tears",def:"Forced relocation of Cherokee and other Native peoples from the Southeast to Oklahoma under the Indian Removal Act (1830)."}],
  quiz:[
   Q("The Market Revolution primarily transformed American society by:",["Eliminating the plantation economy in the South","Creating a market-based, wage-labor economy linked by transportation networks","Reducing economic inequality between regions","Ending dependence on European manufactured goods"],1,"The Market Revolution shifted the economy from subsistence farming to a commercial, market-oriented economy with new class divisions, gender roles, and transportation networks like canals and railroads."),
   Q("Andrew Jackson's Indian Removal Act was justified by proponents primarily as:",["A humanitarian effort to protect Native peoples","Necessary for U.S. territorial and economic expansion","A fulfillment of treaty obligations","Protection from European interference"],1,"Supporters argued removal was necessary for expansion, though it was driven by settler land hunger and racial ideology — resulting in the forced deaths of thousands on the Trail of Tears."),
   Q("The Seneca Falls Convention of 1848 was most directly influenced by:",["The industrial labor movement","Enlightenment ideas and the abolitionist movement","Catholic social teaching","The doctrine of separate spheres"],1,"The women's rights movement drew on Enlightenment natural rights ideals and was closely tied to abolitionism — Elizabeth Cady Stanton drew direct parallels between slavery and the oppression of women."),
   Q("The Second Great Awakening contributed to reform movements primarily by:",["Encouraging people to accept their social position","Inspiring a sense of personal moral responsibility and perfectibility","Unifying Protestant denominations under one church","Discouraging women from participating in public life"],1,"The Second Great Awakening stressed that individuals could achieve moral perfection through faith and action, giving religious urgency to abolitionism, temperance, and women's rights movements."),
   Q("The Missouri Compromise of 1820 was significant because it:",["Permanently ended the debate over slavery in the territories","Admitted Missouri as a free state and Maine as a slave state","Drew a geographic line temporarily managing slavery's expansion into Louisiana Territory","Gave Congress power to abolish slavery in existing states"],2,"The Missouri Compromise admitted Missouri as a slave state, Maine as a free state, and drew the 36°30' line — an uneasy truce lasting until the Kansas-Nebraska Act of 1854."),
   Q("Marbury v. Madison (1803) established the principle of:",["Federal supremacy over state laws","Judicial review — the Supreme Court's power to declare laws unconstitutional","Presidential power to remove judges","Congressional oversight of the executive branch"],1,"Chief Justice Marshall's ruling established judicial review, giving the Supreme Court power to strike down laws that violated the Constitution — fundamentally shaping the balance of power in American government."),
   Q("The 'cult of domesticity' in the early 19th century primarily served to:",["Give middle-class women greater economic independence","Define women's proper sphere as the home and family, separate from public life","Encourage women to pursue careers in education","Challenge traditional gender roles in American society"],1,"The cult of domesticity idealized middle-class women as moral guardians of the home, assigning them a separate domestic sphere while men occupied the public world of commerce and politics."),
   Q("The Nullification Crisis of 1832–33 was most significant because it:",["Led to South Carolina leaving the Union","Resulted in a permanent lowering of the tariff","Established the principle that states could not unilaterally nullify federal law","Showed that the federal government was too weak to enforce its laws"],2,"Though resolved by compromise, Jackson's forceful assertion that nullification was treason established that states could not legally override federal law — a precedent tested again in the Civil War."),
   Q("Which best describes the abolitionist movement's strategy in the 1830s?",["Gradual emancipation through political compromise","Immediate emancipation and moral persuasion through newspapers and speeches","Violent overthrow of the slave system","Working within the Democratic Party to pass anti-slavery legislation"],1,"William Lloyd Garrison's The Liberator and the American Anti-Slavery Society called for immediate emancipation and used moral suasion — religious and ethical arguments — to persuade Americans of slavery's evil."),
   Q("How did the Erie Canal (1825) transform American society?",["It primarily benefited Southern agricultural exporters","It linked the Great Lakes to New York City, dramatically lowering transport costs and boosting Western settlement","It was quickly made obsolete by railroad technology","It was funded entirely by private investment"],1,"The Erie Canal dramatically reduced transportation costs between the Midwest and East Coast, fueling Western migration, boosting New York City's commercial dominance, and demonstrating the power of internal improvements."),
   Q("The Monroe Doctrine (1823) primarily asserted that:",["The U.S. would expand its territory into Latin America","The Western Hemisphere was closed to further European colonization and interference","The U.S. would form military alliances with Latin American nations","European nations must repay their war debts to the United States"],1,"The Monroe Doctrine declared the Western Hemisphere off-limits to further European colonization, positioning the U.S. as the dominant power in the Americas — though the U.S. lacked military power to actually enforce it."),
   Q("Nat Turner's Rebellion of 1831 most directly resulted in:",["Greater freedom for enslaved people in the South","Increased restrictions on enslaved people and heightened Southern fears of slave revolt","A major Congressional debate leading to gradual emancipation","Federal intervention to protect the rights of enslaved people"],1,"Turner's Rebellion, in which enslaved people killed approximately 60 white Virginians, sparked intense fear across the South, leading to stricter slave codes and a hardening of pro-slavery ideology."),
   Q("The Lowell System is significant in this period because it:",["Created the first labor unions in American history","Demonstrated that manufacturing could be organized on a large industrial scale using young women workers","Proved that slavery was economically inefficient in the North","Led to the first successful strike in American history"],1,"The Lowell textile mills pioneered large-scale industrial manufacturing using young farm women, creating company towns and supervised work — a model that transformed American manufacturing and women's labor."),
   Q("How did the election of Andrew Jackson in 1828 represent a shift in American democracy?",["It reduced property requirements for voting in all states","It represented the rise of mass political participation and the common white man in politics","It gave women and free Black men the right to vote","It marked the end of partisan political competition"],1,"Jackson's election, supported by mass rallies and party organization, represented the rise of popular democracy among white men — expanding suffrage to non-property owners while excluding women, Native Americans, and enslaved people."),
   Q("The concept of 'Manifest Destiny' was used to justify all of the following EXCEPT:",["The annexation of Texas","The Mexican-American War","The Indian Removal Act","The purchase of Alaska from Russia"],3,"Manifest Destiny was invoked to justify westward continental expansion at the expense of Mexico and Native peoples. The Alaska purchase (1867) was framed more in terms of strategic and commercial advantage.")
  ]},
